<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Bot Run History</title>
<style>
/* ---- Base layout --------------------------------------------------- */
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 2rem;
    line-height: 1.5;
    background: var(--bg);
    color: var(--fg);
}
h1 {
    margin-bottom: 1rem;
}

/* ---- Table styling ------------------------------------------------- */
table {
    border-collapse: collapse;
    width: 100%;
    max-width: 900px;
}
th, td {
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    text-align: left;
}
th {
    background: var(--header-bg);
}
tr:nth-child(even) {
    background: var(--row-even);
}

/* ---- Dark‑mode variables ------------------------------------------- */
:root {
    --bg: #ffffff;
    --fg: #111111;
    --border: #dddddd;
    --header-bg: #f4f4f4;
    --row-even: #fafafa;
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #1e1e1e;
        --fg: #e0e0e0;
        --border: #444444;
        --header-bg: #2a2a2a;
        --row-even: #252525;
    }
}

/* ---- Dark‑mode toggle button --------------------------------------- */
#theme-toggle {
    position: fixed;
    top: 1rem;
    right: 1rem;
    background: var(--header-bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-size: 0.9rem;
}
</style>
</head>
<body>

<h1>YouTube Bot Run History</h1>

<table>
    <thead>
        <tr>
            <th>Age</th>
            <th>Source</th>
            <th>Time (ms)</th>
            <th>In (KB)</th>
            <th>Out (KB)</th>
        </tr>
    </thead>
    <tbody>
        <tr><td>21 h</td><td>ok</td><td>318</td><td>2.5 K</td><td>4.4 K</td></tr>
        <tr><td>19 h</td><td>ok</td><td>826</td><td>0.5 K</td><td>4.5 K</td></tr>
        <tr><td>17 h</td><td>ok</td><td>700</td><td>34 K</td><td>4.5 K</td></tr>
        <tr><td>15 h</td><td>ok</td><td>448</td><td>77 K</td><td>4.5 K</td></tr>
        <tr><td>13 h</td><td>ok</td><td>598</td><td>406 K</td><td>24.5 K</td></tr>
        <tr><td>5 h</td><td>ok</td><td>158</td><td>88 K</td><td>4.5 K</td></tr>
        <tr><td>3 h</td><td>ok</td><td>145</td><td>104 K</td><td>6.9 K</td></tr>
        <tr><td>1 h</td><td>ok</td><td>78</td><td>674 K</td><td>4.5 K</td></tr>
    </tbody>
</table>

<button id="theme-toggle">Toggle dark mode</button>

<script>
/* Simple manual toggle – stores preference in localStorage */
const toggleBtn = document.getElementById('theme-toggle');
const root = document.documentElement;

function setTheme(dark) {
    if (dark) {
        root.dataset.theme = 'dark';
        document.body.style.setProperty('--bg', '#1e1e1e');
        document.body.style.setProperty('--fg', '#e0e0e0');
        document.body.style.setProperty('--border', '#444444');
        document.body.style.setProperty('--header-bg', '#2a2a2a');
        document.body.style.setProperty('--row-even', '#252525');
    } else {
        root.dataset.theme = 'light';
        document.body.style.setProperty('--bg', '#ffffff');
        document.body.style.setProperty('--fg', '#111111');
        document.body.style.setProperty('--border', '#dddddd');
        document.body.style.setProperty('--header-bg', '#f4f4f4');
        document.body.style.setProperty('--row-even', '#fafafa');
    }
    localStorage.setItem('theme', dark ? 'dark' : 'light');
}

toggleBtn.addEventListener('click', () => {
    const isDark = root.dataset.theme !== 'dark';
    setTheme(isDark);
});

/* Load saved preference on page load */
(() => {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') setTheme(true);
    else if (saved === 'light') setTheme(false);
    // otherwise rely on OS preference via the CSS media query
})();
</script>

</body>
</html>
